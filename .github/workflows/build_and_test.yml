name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux ---
          - os: ubuntu-22.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
          
          # --- macOS ---
          - os: macos-13
            arch: amd64
          - os: macos-14
            arch: arm64
          
          # --- Windows ---
          # Windows support is experimental.
          - os: windows-latest
            arch: amd64

    steps:
    - uses: actions/checkout@v4

    # --- Linux Setup ---
    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        # Add PG Repo
        sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
        wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
        sudo apt-get update
        sudo apt-get install -y postgresql-15 postgresql-server-dev-15 postgresql-15-pgvector curl unzip build-essential
        
        # Start Service
        sudo service postgresql start
        # Wait for service
        while ! pg_isready; do sleep 1; done
        
        # Configure User
        sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
        sudo -u postgres psql -c "CREATE EXTENSION IF NOT EXISTS vector;"

    # --- macOS Setup ---
    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install postgresql@15
        brew services start postgresql@15
        
        # Link brew postgres path
        echo "/usr/local/opt/postgresql@15/bin" >> $GITHUB_PATH
        echo "/opt/homebrew/opt/postgresql@15/bin" >> $GITHUB_PATH
        
        # Wait for service
        sleep 5
        
        # Create user/db (Homebrew postgres usually runs as current user)
        createdb postgres || true
        # We might not need pgvector for macOS yet, or can brew install it
        # brew install pgvector/pgvector/pgvector || true

    # --- Windows Setup ---
    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo "Windows build is experimental."
        # Attempt to find if there's a way to build.
        # Without MSVC setup matching Postgres, this is likely to fail compilation.
        # We continue to at least test the 'download_libduckdb' script.

    # --- Common Steps ---
    - name: Download libduckdb
      shell: bash
      run: ./download_libduckdb.sh

    - name: Build and Install
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
           echo "Skipping build on Windows due to complexity of PGXS env setup."
           exit 0
        fi
        
        make USE_PGXS=1
        sudo make USE_PGXS=1 install || make USE_PGXS=1 install

    - name: Run Tests
      shell: bash
      env:
        PGPASSWORD: postgres
        PGUSER: postgres
        PGHOST: localhost
        PGPORT: 5432
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
           echo "Skipping tests on Windows."
           exit 0
        fi
        
        # macOS specific overrides
        if [ "$RUNNER_OS" == "macOS" ]; then
           export PGUSER=$(whoami)
           export PGPASSWORD=""
           export PGHOST="/tmp" 
           # Ensure PGHOST matches where brew postgres listens. Often /tmp or /var/run/...
           # 'createdb' worked, so 'psql' should work with default env.
           unset PGPASSWORD
        fi
        
        ./run_tests.sh